spring.application.name=pr-judge
spring.profiles.active=dev
server.port=8080

# JWT — override with a cryptographically random 256-bit+ secret in production via JWT_SECRET env var
jwt.secret=${JWT_SECRET:pr-judge-secret-key-change-in-production-must-be-at-least-256-bits-long}
jwt.expiration=86400000

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JPA Auditing
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
