spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/prjudge}
spring.datasource.username=${DATABASE_USER:prjudge}
spring.datasource.password=${DATABASE_PASSWORD:prjudge}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.com.prjudge=INFO
